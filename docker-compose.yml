services:
  db:
    image: postgres:15-alpine
    container_name: db
    env_file:
      - backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis

  web:
    working_dir: /app
    build: ./backend
    container_name: web
    env_file:
      - backend/.env
    command: >
      sh -c "sleep 10 && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: frontend
    user: root
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: >
      sh -c "npm install && 
             chmod -R 777 node_modules && 
             npx vite --host 0.0.0.0"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - web

  test:
      build: ./backend
      container_name: test
      env_file:
        - backend/.env
      environment:
        - DJANGO_SETTINGS_MODULE=config.settings
      volumes:
        - ./backend:/app
      depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_started
      command: ["/bin/true"]

volumes:
  postgres_data: